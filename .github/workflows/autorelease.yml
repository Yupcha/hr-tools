name: Auto release (on merge to main)

# Your flow: PR → CI (ci.yml) verifies it → merge to main → THIS workflow ships
# a new version. Each merge builds every platform binary + a signed Android APK
# and publishes a fresh release vX.Y.<build>.
#
# Versioning: major.minor come from package.json; the patch is this workflow's
# run number, so each merge auto-increments (v0.1.1, v0.1.2, …). Bump the
# major/minor by editing package.json's version in a PR. The version is injected
# into the build (scripts/set-version.mjs) — nothing is committed back to main,
# so this works even when main is branch-protected.
#
# 💸 COST: a full run builds macOS (×2, billed 10×), Windows, Linux and Android
# on EVERY merge (~200 billable minutes). If that's too much, the cheapest lever
# is to drop the `android` job, or gate this workflow on a commit-message marker
# / a schedule. Docs-only merges are skipped (paths-ignore); `[skip ci]` works too.
#
# (release.yml still handles explicit, hand-pushed `v*` tags for special releases.)

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"
  workflow_dispatch:

# Don't cancel an in-flight release; let each one finish.
concurrency:
  group: autorelease
  cancel-in-progress: false

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        run: |
          BASE=$(node -p "require('./package.json').version.split('.').slice(0,2).join('.')")
          V="$BASE.${{ github.run_number }}"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V" >> "$GITHUB_OUTPUT"
          echo "Releasing v$V"

  # ── Desktop: macOS (arm64 + x64), Linux, Windows ──────────────────────────
  desktop:
    needs: version
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: macos-latest, args: "--target aarch64-apple-darwin" }
          - { platform: macos-latest, args: "--target x86_64-apple-darwin" }
          - { platform: ubuntu-22.04, args: "" }
          - { platform: windows-latest, args: "" }
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Stamp version
        shell: bash
        run: node scripts/set-version.mjs "${{ needs.version.outputs.version }}"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - run: bun install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.version.outputs.tag }}
          releaseName: "hr-tools ${{ needs.version.outputs.tag }}"
          releaseBody: "Publishing… full release notes appear when all builds finish."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # ── Rich release notes: CHANGELOG section + downloads guide + commit log ──
  notes:
    needs: [version, desktop]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags for the commit log

      - name: Compose and publish release notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.version.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          BASE=$(node -p "require('./package.json').version.split('.').slice(0,2).join('.')")
          PREV=$(gh release list --exclude-drafts --limit 10 --json tagName --jq '.[].tagName' \
                 | grep -v "^$TAG\$" | head -n 1 || true)
          {
            echo "**Free, open-source, 100% offline HR toolkit — nothing leaves your machine.**"
            echo
            # The CHANGELOG section for this release line (matches major.minor).
            awk -v ver="$BASE" '
              index($0, "## [" ver) == 1 { on = 1; next }
              /^## \[/ && on { exit }
              on { print }
            ' CHANGELOG.md
            echo
            echo "### 📦 Which file do I download?"
            echo
            echo "| You're on | Grab |"
            echo "| --- | --- |"
            echo "| **macOS** (M1/M2/M3/M4) | \`…_aarch64.dmg\` |"
            echo "| **macOS** (Intel) | \`…_x64.dmg\` |"
            echo "| **Windows** | \`…_x64-setup.exe\` (or \`.msi\`) |"
            echo "| **Linux** | \`.AppImage\` (portable) · \`.deb\` · \`.rpm\` |"
            echo "| **Android** (sideload) | \`…-android.apk\` |"
            echo
            echo "> **First launch:** builds are unsigned (no paid certificate). macOS: right-click → Open → Open. Windows: More info → Run anyway. Android: allow *Install unknown apps*."
            echo
            if [ -n "$PREV" ]; then
              echo "### 🔀 Commits since $PREV"
              echo
              git log --no-merges --pretty='- %s (%h)' "$PREV"..HEAD -- . | head -n 40
              N=$(git rev-list --no-merges --count "$PREV"..HEAD)
              [ "$N" -gt 40 ] && echo "- …and $((N - 40)) more"
              echo
              echo "**Full diff:** https://github.com/$REPO/compare/$PREV...$TAG"
            fi
          } > notes.md
          gh release edit "$TAG" --notes-file notes.md

  # ── Mobile: signed Android APK ────────────────────────────────────────────
  android:
    needs: [version, desktop]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Stamp version
        shell: bash
        run: node scripts/set-version.mjs "${{ needs.version.outputs.version }}"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;27.1.12297006" "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.1.12297006" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.1.12297006" >> "$GITHUB_ENV"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - run: bun install --frozen-lockfile

      - name: Initialize Android project
        run: bun run tauri android init

      # Android defaults to allowBackup=true, which lets Google Auto Backup
      # upload the app's data dir — including the WebView localStorage that
      # holds saved HR profiles — to the user's Google Drive. Local-only means
      # local-only: turn it off in the generated manifest.
      - name: Harden Android manifest (no OS backup of HR data)
        run: |
          M=src-tauri/gen/android/app/src/main/AndroidManifest.xml
          if grep -q 'android:allowBackup' "$M"; then
            sed -i 's/android:allowBackup="true"/android:allowBackup="false"/' "$M"
          else
            perl -0pi -e 's/<application\b/<application android:allowBackup="false"/' "$M"
          fi
          grep -q 'android:allowBackup="false"' "$M" || { echo "manifest hardening failed"; cat "$M"; exit 1; }

      # Use the persistent signing key from repo secrets so every release is
      # signed by the same identity and APKs update in place. Forks without the
      # secrets fall back to a throwaway key (sideload-only, no continuity).
      - name: Provision signing keystore
        working-directory: src-tauri/gen/android
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'hrtoolkit-sideload' }}
        run: |
          if [ -n "$KS_B64" ]; then
            echo "$KS_B64" | base64 -d > keystore.jks
            echo "Using persistent keystore from secrets"
          else
            keytool -genkeypair -v -keystore keystore.jks -keyalg RSA -keysize 2048 \
              -validity 10000 -alias hrtoolkit -storepass "$KS_PASS" -keypass "$KS_PASS" \
              -dname "CN=hr-tools, O=Yupcha, C=US"
            echo "::warning::No ANDROID_KEYSTORE_B64 secret — APK signed with a throwaway key"
          fi

      - name: Build release APK (stripped & optimised)
        run: bun run tauri android build --apk

      - name: Sign & collect APK
        id: apk
        env:
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'hrtoolkit-sideload' }}
        run: |
          BT=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -n 1)
          KS="$PWD/src-tauri/gen/android/keystore.jks"
          RAW=$(find src-tauri/gen/android -name "*release*.apk" | head -n 1)
          [ -z "$RAW" ] && RAW=$(find src-tauri/gen/android -name "*.apk" | head -n 1)
          if [ -z "$RAW" ]; then echo "::error::No APK produced"; exit 1; fi
          echo "raw APK: $RAW ($(du -h "$RAW" | cut -f1))"
          "$BT/zipalign" -f -p 4 "$RAW" aligned.apk
          "$BT/apksigner" sign --ks "$KS" --ks-pass "pass:$KS_PASS" --ks-key-alias hrtoolkit aligned.apk
          "$BT/apksigner" verify --verbose aligned.apk
          OUT="hr-tools-${{ needs.version.outputs.tag }}-android.apk"
          mv aligned.apk "$OUT"
          echo "path=$OUT" >> "$GITHUB_OUTPUT"

      - name: Attach APK to the release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.version.outputs.tag }}" "${{ steps.apk.outputs.path }}" --clobber
