name: Release

# Build installers for every desktop platform + an Android APK when a version
# tag is pushed (e.g. v0.1.0), and attach them to a draft GitHub Release.
# Can also be re-run manually from the Actions tab (workflow_dispatch).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build & attach artifacts to (e.g. v0.1.0)"
        required: true

env:
  TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  # ── Desktop: macOS (arm64 + x64), Linux, Windows ──────────────────────────
  desktop:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - run: bun install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.TAG }}
          releaseName: "hrToolkit ${{ env.TAG }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # ── Mobile: Android APK ───────────────────────────────────────────────────
  # The Android project (gen/android) is generated fresh in CI. The APK is a
  # debug-signed, installable sideload build — no keystore secrets required.
  # For Play Store / stable cross-version update signing, add your own keystore
  # (see the commented "release signing" notes below).
  android:
    needs: desktop
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;27.1.12297006" "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.1.12297006" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.1.12297006" >> "$GITHUB_ENV"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - run: bun install --frozen-lockfile

      - name: Initialize Android project
        run: bun run tauri android init

      # Generate a signing keystore (from the ANDROID_KEYSTORE_PASSWORD secret if
      # set, else a default for sideload builds). For Play Store / stable
      # cross-version update signing, set that secret to your own key's password
      # and commit your keystore via a secret instead.
      - name: Generate signing keystore
        working-directory: src-tauri/gen/android
        env:
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'hrtoolkit-sideload' }}
        run: |
          keytool -genkeypair -v -keystore keystore.jks -keyalg RSA -keysize 2048 \
            -validity 10000 -alias hrtoolkit -storepass "$KS_PASS" -keypass "$KS_PASS" \
            -dname "CN=hrToolkit, O=Yupcha, C=US"

      - name: Build release APK (stripped & optimised)
        run: bun run tauri android build --apk

      # Explicitly zipalign + sign the release APK ourselves so it's installable
      # regardless of the generated Gradle config, and verify the signature.
      - name: Sign & collect APK
        id: apk
        env:
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'hrtoolkit-sideload' }}
        run: |
          BT=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -n 1)
          KS="$PWD/src-tauri/gen/android/keystore.jks"
          RAW=$(find src-tauri/gen/android -name "*release*.apk" | head -n 1)
          [ -z "$RAW" ] && RAW=$(find src-tauri/gen/android -name "*.apk" | head -n 1)
          if [ -z "$RAW" ]; then echo "::error::No APK produced"; exit 1; fi
          echo "raw APK: $RAW ($(du -h "$RAW" | cut -f1))"
          "$BT/zipalign" -f -p 4 "$RAW" aligned.apk
          "$BT/apksigner" sign --ks "$KS" --ks-pass "pass:$KS_PASS" --ks-key-alias hrtoolkit aligned.apk
          "$BT/apksigner" verify --verbose aligned.apk
          OUT="hrToolkit-${TAG}-android.apk"
          mv aligned.apk "$OUT"
          echo "path=$OUT" >> "$GITHUB_OUTPUT"
          ls -la "$OUT"

      - name: Attach APK to the release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$TAG" "${{ steps.apk.outputs.path }}" --clobber
